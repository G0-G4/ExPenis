# Custom log format
log_format proxy_log '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'proxy:$upstream_addr->$upstream_status '
                     'rt=${request_time}u req_body:"$request_body"';

# HTTP server - redirect to HTTPS
server {
    access_log /var/log/nginx/access.log proxy_log;
    error_log /var/log/nginx/error.log warn;
    listen 80;
    server_name expenis.g0g4.ru;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    access_log /var/log/nginx/access.log proxy_log;
    error_log /var/log/nginx/error.log warn;
    listen 443 ssl;
    server_name expenis.g0g4.ru;

    # SSL configuration
    ssl_certificate /etc/nginx/ssl/live/expenis.g0g4.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/nginx/ssl/live/expenis.g0g4.ru/privkey.pem; # managed by Certbot
    include /etc/nginx/ssl/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/nginx/ssl/ssl-dhparams.pem; # managed by Certbot

    root /usr/share/nginx/html;
    index index.html;

    # Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Точки входа — не кешировать
    location = /index.html           { add_header Cache-Control "no-cache"; }
    location = /flutter_bootstrap.js { add_header Cache-Control "no-cache"; }
    location = /flutter.js           { add_header Cache-Control "no-cache, must-revalidate"; }
    location = /flutter_service_worker.js { add_header Cache-Control "no-cache"; }
    location = /main.dart.js        { add_header Cache-Control "no-cache, must-revalidate"; }
    location = /manifest.json        { expires 1h; }
    location = /version.json         { add_header Cache-Control "no-cache"; }
    location = /favicon.png          { expires 7d; }

    # Версионированные/хешированные ассеты — жёсткое кеширование
    location /assets/   { expires 1y; add_header Cache-Control "public, immutable"; }
    location /canvaskit/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location /icons/     { expires 7d; }
    location /splash/   { expires 7d; }

    # API proxy
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important: Pass through authentication headers
        proxy_set_header Authorization $http_authorization;

        # Buffer settings to handle errors properly
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Don't intercept backend errors
        proxy_intercept_errors off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_proxied any;
}

# ============================================
# panel.g0g4.ru Configuration (for 3x-ui)
# ============================================

# HTTP for panel.g0g4.ru (for certificate renewal)
server {
    listen 8081;
    server_name panel.g0g4.ru;

    # Special location for Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

