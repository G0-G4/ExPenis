name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode release keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > frontend/android/app/expenis-release.jks

      - name: Create key.properties
        run: |
          cat > frontend/android/key.properties << 'EOF'
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          storeFile=../app/expenis-release.jks
          EOF

      - name: Download Flutter dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build release APK
        run: flutter build apk --release
        working-directory: frontend

      - name: Read version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv frontend/build/app/outputs/flutter-apk/app-release.apk \
             "ExPenis-${{ steps.version.outputs.tag }}.apk"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "ExPenis-${{ steps.version.outputs.tag }}.apk"